# Build Valentino POS desktop app with Pake (https://github.com/tw93/Pake)
name: Build Desktop App (Pake)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Target platform
        required: true
        default: windows
        type: choice
        options:
          - windows
          - macos
          - linux
      debug:
        description: Debug build
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    name: Pake (${{ inputs.platform }})
    runs-on: ${{ inputs.platform == 'windows' && 'windows-latest' || inputs.platform == 'macos' && 'macos-latest' || 'ubuntu-latest' }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install pake-cli
        run: pnpm add -g pake-cli

      - name: Package Valentino POS
        shell: bash
        run: |
          set -euo pipefail
          EXTRA=()
          if [ "${{ inputs.debug }}" = "true" ]; then
            EXTRA+=(--debug)
          fi
          if [ "${{ inputs.platform }}" = "windows" ]; then
            EXTRA+=(--targets x64)
          fi
          pake --config desktop/pake.json "${EXTRA[@]}"

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p desktop-dist
          # Pake writes installers near CWD / under temp target dirs
          find . -type f \( \
            -name '*.msi' -o -name '*.exe' -o \
            -name '*.dmg' -o -name '*.app' -o \
            -name '*.deb' -o -name '*.AppImage' -o -name '*.rpm' \
          \) \
            ! -path './node_modules/*' \
            ! -path './.git/*' \
            -print0 2>/dev/null | while IFS= read -r -d '' f; do
              cp -f "$f" desktop-dist/ 2>/dev/null || true
            done
          # Also copy common output names
          for f in ValentinoPOS* valentino*; do
            [ -e "$f" ] && cp -rf "$f" desktop-dist/ || true
          done
          ls -la desktop-dist || true
          test "$(ls -A desktop-dist 2>/dev/null)" || {
            echo "No desktop package found"
            find . -maxdepth 4 -type f \( -name '*.msi' -o -name '*.dmg' -o -name '*.deb' \) 2>/dev/null | head -50
            exit 1
          }

      - name: Upload desktop package
        uses: actions/upload-artifact@v4
        with:
          name: valentino-pos-${{ inputs.platform }}
          path: desktop-dist/
          if-no-files-found: error
          retention-days: 30
